name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Check installed dependency consistency
        run: python -m pip check

      - name: Run tests
        run: python -m pytest

  docker-smoke:
    name: Docker production smoke
    runs-on: ubuntu-latest
    # Fixed job-level paths so always() cleanup can locate resources even if the
    # prepare step fails before creating files.
    env:
      SMOKE_DIR: /tmp/nsfwtrack-docker-smoke
      COMPOSE_PROJECT_NAME: nsfwtrack-ci-smoke
      COMPOSE_FILE: /tmp/nsfwtrack-docker-smoke/docker-compose.yml

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Prepare isolated CI data and temporary credentials
        run: |
          set -euo pipefail
          # The image runs as fixed UID/GID 10001:10001 and has no capability
          # available to bypass host bind-mount permissions.
          mkdir -p "${SMOKE_DIR}"
          sudo install -d -m 0700 -o 10001 -g 10001 "${SMOKE_DIR}/data"
          APP_PASSWORD="$(python3 -c 'import secrets; print(secrets.token_urlsafe(24))')"
          SECRET_KEY="$(python3 -c 'import secrets; print(secrets.token_hex(32))')"
          # Temporary CI-only credentials. Never use .env.example placeholders.
          {
            echo "APP_PASSWORD=${APP_PASSWORD}"
            echo "SECRET_KEY=${SECRET_KEY}"
            echo "DATABASE_URL=sqlite:///data/nsfwtrack.db"
          } > "${SMOKE_DIR}/.env"
          {
            echo "services:"
            echo "  nsfwtrack:"
            echo "    build: ${GITHUB_WORKSPACE}"
            echo "    env_file:"
            echo "      - ${SMOKE_DIR}/.env"
            echo "    read_only: true"
            echo "    cap_drop:"
            echo "      - ALL"
            echo "    security_opt:"
            echo "      - no-new-privileges:true"
            echo "    tmpfs:"
            echo "      - /tmp:size=64m,mode=1777"
            echo "    ports:"
            echo '      - "18080:8000"'
            echo "    volumes:"
            echo "      - ${SMOKE_DIR}/data:/app/data"
            echo '    restart: "no"'
          } > "${COMPOSE_FILE}"

      - name: Build production image
        run: docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" build

      - name: Start container
        run: docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" up -d

      - name: Wait for container health
        run: |
          set -euo pipefail
          container_id="$(docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" ps -q nsfwtrack)"
          if [ -z "${container_id}" ]; then
            echo "docker smoke failed: container was not created" >&2
            exit 1
          fi
          deadline=$((SECONDS + 90))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "${container_id}")"
            echo "container health: ${health}"
            if [ "${health}" = "healthy" ]; then
              exit 0
            fi
            running="$(docker inspect --format='{{.State.Running}}' "${container_id}")"
            if [ "${running}" != "true" ]; then
              echo "docker smoke failed: container stopped before becoming healthy" >&2
              exit 1
            fi
            sleep 2
          done
          echo "docker smoke failed: container did not become healthy" >&2
          exit 1

      - name: Verify runtime security and writable paths
        run: |
          set -euo pipefail
          container_id="$(docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" ps -q nsfwtrack)"
          test -n "${container_id}"

          test "$(docker inspect --format='{{.Config.User}}' "${container_id}")" = "10001:10001"
          test "$(docker inspect --format='{{.HostConfig.ReadonlyRootfs}}' "${container_id}")" = "true"
          docker inspect --format='{{json .HostConfig.CapDrop}}' "${container_id}" | grep -q '"ALL"'
          docker inspect --format='{{json .HostConfig.SecurityOpt}}' "${container_id}" | grep -q '"no-new-privileges:true"'
          test "$(docker inspect --format='{{if index .HostConfig.Tmpfs "/tmp"}}configured{{end}}' "${container_id}")" = "configured"

          docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" exec -T nsfwtrack sh -eu -c '
            data_probe=/app/data/.ci-write-probe
            tmp_probe=/tmp/.ci-write-probe
            trap "rm -f ${data_probe} ${tmp_probe}" EXIT
            test "$(id -u)" = "10001"
            test "$(id -g)" = "10001"
            test "$(awk "/^CapEff:/ {print \$2}" /proc/1/status)" = "0000000000000000"
            test "$(awk "/^NoNewPrivs:/ {print \$2}" /proc/1/status)" = "1"
            : > "${data_probe}"
            : > "${tmp_probe}"
            for target in /app/.ci-readonly-probe /etc/.ci-readonly-probe /usr/local/.ci-readonly-probe; do
              if touch "${target}" 2>/dev/null; then
                echo "unexpected writable path: ${target}" >&2
                rm -f "${target}" || true
                exit 1
              fi
            done
            test -s /app/data/nsfwtrack.db
            python -c "import sqlite3; connection = sqlite3.connect(\"/app/data/nsfwtrack.db\"); assert connection.execute(\"SELECT MAX(version) FROM schema_migrations\").fetchone()[0] == 1"
          '

      - name: Recreate container and verify SQLite persistence
        run: |
          set -euo pipefail
          sudo test -s "${SMOKE_DIR}/data/nsfwtrack.db"
          docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" stop nsfwtrack
          docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" rm -f nsfwtrack
          sudo test -s "${SMOKE_DIR}/data/nsfwtrack.db"
          docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" up -d nsfwtrack

          container_id="$(docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" ps -q nsfwtrack)"
          test -n "${container_id}"
          deadline=$((SECONDS + 90))
          while [ "${SECONDS}" -lt "${deadline}" ]; do
            health="$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "${container_id}")"
            echo "recreated container health: ${health}"
            if [ "${health}" = "healthy" ]; then
              break
            fi
            running="$(docker inspect --format='{{.State.Running}}' "${container_id}")"
            if [ "${running}" != "true" ]; then
              echo "docker smoke failed: recreated container stopped before becoming healthy" >&2
              exit 1
            fi
            sleep 2
          done
          test "${health}" = "healthy"
          test "$(docker inspect --format='{{.Config.User}}' "${container_id}")" = "10001:10001"
          docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" exec -T nsfwtrack sh -eu -c '
            test "$(id -u)" = "10001"
            test "$(id -g)" = "10001"
            test -s /app/data/nsfwtrack.db
            python -c "import sqlite3; connection = sqlite3.connect(\"/app/data/nsfwtrack.db\"); assert connection.execute(\"SELECT MAX(version) FROM schema_migrations\").fetchone()[0] == 1"
          '

      - name: Wait for /login and verify security headers
        run: |
          set -euo pipefail
          python3 <<'PY'
          import sys
          import time
          import urllib.request

          url = "http://127.0.0.1:18080/login"
          required = {
              "x-content-type-options": "nosniff",
              "referrer-policy": "strict-origin-when-cross-origin",
              "x-frame-options": "DENY",
          }
          deadline = time.time() + 60
          last_error = "no response"
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=5) as response:
                      status = response.getcode()
                      headers = {k.lower(): v for k, v in response.headers.items()}
                      if status != 200:
                          last_error = f"status={status}"
                      else:
                          missing = [
                              f"{name} expected {expected!r} got {headers.get(name)!r}"
                              for name, expected in required.items()
                              if headers.get(name) != expected
                          ]
                          permissions = headers.get("permissions-policy", "")
                          if "camera=()" not in permissions:
                              missing.append(
                                  f"permissions-policy missing camera=(): {permissions!r}"
                              )
                          request_id = headers.get("x-request-id", "")
                          if not request_id:
                              missing.append("missing x-request-id")
                          if "strict-transport-security" in headers:
                              missing.append("unexpected HSTS")
                          if "content-security-policy" in headers:
                              missing.append("unexpected CSP")
                          if not missing:
                              print("docker smoke ok")
                              print(f"status={status}")
                              for name in list(required) + [
                                  "permissions-policy",
                                  "x-request-id",
                              ]:
                                  print(f"{name}: {headers.get(name)}")
                              sys.exit(0)
                          last_error = "; ".join(missing)
              except Exception as exc:  # noqa: BLE001 - smoke wait loop
                  last_error = f"{type(exc).__name__}: {exc}"
              time.sleep(2)
          print(f"docker smoke failed: {last_error}", file=sys.stderr)
          sys.exit(1)
          PY

      - name: Show container logs on failure
        if: failure()
        run: |
          set +e
          docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" ps -a || true
          docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" logs --no-color || true

      - name: Clean up containers and temporary data
        if: always()
        run: |
          set +e
          docker compose -f "${COMPOSE_FILE}" -p "${COMPOSE_PROJECT_NAME}" down --rmi local --volumes --remove-orphans || true
          if [ -d "${SMOKE_DIR}" ]; then
            sudo rm -rf "${SMOKE_DIR}"
          fi
          echo "docker smoke cleanup complete"
          echo "cleanup targets: SMOKE_DIR=${SMOKE_DIR} COMPOSE_FILE=${COMPOSE_FILE} COMPOSE_PROJECT_NAME=${COMPOSE_PROJECT_NAME}"
