{% extends "base.html" %}
{% block title %}{{ t("items.title") }} - NSFWTrack{% endblock %}
{% block content %}
<div class="toolbar">
  <h1>{{ t("items.title") }}</h1>
  <a class="button" href="/items/new">{{ t("items.new") }}</a>
</div>
<form class="card form-grid" method="get" action="/items">
  <label>{{ t("common.title") }}
    <input name="q" value="{{ q }}" placeholder="{{ t('items.placeholder_title') }}">
  </label>
  <label>{{ t("common.tags") }}
    <input name="tag" value="{{ tag }}" placeholder="{{ t('items.placeholder_tag') }}">
  </label>
  <label>{{ t("common.status") }}
    <select name="state">
      <option value="">{{ t("common.any") }}</option>
      {% for option in status_options %}
        <option value="{{ option }}" {% if selected_state == option %}selected{% endif %}>{{ status_label(option) }}</option>
      {% endfor %}
    </select>
  </label>
  <label>&nbsp;
    <button type="submit">{{ t("common.search") }}</button>
  </label>
</form>
<div class="item-grid">
  {% for item in items %}
    {% include "_item_card.html" %}
  {% else %}
    <p class="muted">{{ t("items.no_matching") }}</p>
  {% endfor %}
</div>
{% endblock %}
