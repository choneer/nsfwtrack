<!doctype html>
<html lang="{{ lang }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}NSFWTrack{% endblock %}</title>
  <style>
    :root {
      --bg: #f6f7f9;
      --panel: #ffffff;
      --line: #d9dee7;
      --text: #1f2933;
      --muted: #687385;
      --accent: #0f766e;
      --accent-strong: #0b5f59;
      --danger: #b42318;
      --warn: #9a6700;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }
    a { color: var(--accent-strong); text-decoration: none; }
    a:hover { text-decoration: underline; }
    header {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav {
      align-items: center;
      display: flex;
      gap: 18px;
      justify-content: space-between;
      margin: 0 auto;
      max-width: 1120px;
      min-height: 58px;
      padding: 0 20px;
    }
    .brand {
      color: var(--text);
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .nav-links {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .language-switch {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .language-switch a {
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--text);
      font-size: 13px;
      padding: 5px 8px;
    }
    .language-switch a.active {
      background: #e8f5f3;
      border-color: #b7ddd8;
      color: var(--accent-strong);
      font-weight: 700;
    }
    main {
      margin: 0 auto;
      max-width: 1120px;
      padding: 26px 20px 48px;
    }
    h1 { font-size: 28px; margin: 0 0 18px; }
    h2 { font-size: 20px; margin: 0 0 14px; }
    h3 { font-size: 17px; margin: 0 0 8px; }
    p { margin: 0 0 12px; }
    .muted { color: var(--muted); }
    .toolbar {
      align-items: end;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: space-between;
      margin-bottom: 18px;
    }
    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .item-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    }
    .cover {
      align-items: center;
      aspect-ratio: 4 / 3;
      background: #e9edf3;
      border: 1px solid var(--line);
      border-radius: 6px;
      color: var(--muted);
      display: flex;
      font-size: 13px;
      justify-content: center;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .cover img {
      height: 100%;
      object-fit: cover;
      width: 100%;
    }
    .tag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .pill {
      background: #e8f5f3;
      border: 1px solid #b7ddd8;
      border-radius: 999px;
      color: #0b5f59;
      display: inline-flex;
      font-size: 12px;
      line-height: 1;
      padding: 5px 8px;
      white-space: nowrap;
    }
    .state {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: #3730a3;
    }
    form.stack, .stack {
      display: grid;
      gap: 12px;
    }
    .form-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }
    label {
      color: var(--muted);
      display: grid;
      font-size: 13px;
      gap: 5px;
    }
    input, textarea, select {
      background: #fff;
      border: 1px solid #cbd3df;
      border-radius: 6px;
      color: var(--text);
      font: inherit;
      min-height: 38px;
      padding: 8px 10px;
      width: 100%;
    }
    textarea { min-height: 96px; resize: vertical; }
    button, .button {
      align-items: center;
      background: var(--accent);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      display: inline-flex;
      font: inherit;
      font-weight: 650;
      justify-content: center;
      min-height: 38px;
      padding: 8px 12px;
      text-decoration: none;
      white-space: nowrap;
    }
    button:hover, .button:hover {
      background: var(--accent-strong);
      text-decoration: none;
    }
    .button.secondary, button.secondary {
      background: #fff;
      border-color: #b8c1cf;
      color: var(--text);
    }
    .button.danger, button.danger {
      background: #fff;
      border-color: #efb5ae;
      color: var(--danger);
    }
    .inline-form {
      display: inline-flex;
      margin: 0;
    }
    .actions {
      align-items: center;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    table {
      background: var(--panel);
      border-collapse: collapse;
      border-radius: 8px;
      overflow: hidden;
      width: 100%;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #eef1f5; font-size: 13px; color: var(--muted); }
    tr:last-child td { border-bottom: 0; }
    .split {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 1.5fr) minmax(260px, 0.8fr);
    }
    .notice {
      background: #fff7ed;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      color: var(--warn);
      padding: 10px 12px;
    }
    @media (max-width: 760px) {
      .nav { align-items: flex-start; flex-direction: column; padding: 14px 20px; }
      .split { grid-template-columns: 1fr; }
      .toolbar { align-items: stretch; flex-direction: column; }
      .actions { width: 100%; }
      .actions > * { flex: 1 1 auto; }
    }
  </style>
</head>
<body>
  <header>
    <nav class="nav">
      <a class="brand" href="/">NSFWTrack</a>
      <div class="language-switch">
        <a class="{% if lang == 'zh' %}active{% endif %}" href="/set-language?lang=zh&next={{ request.url.path }}">{{ t("language.zh") }}</a>
        <a class="{% if lang == 'en' %}active{% endif %}" href="/set-language?lang=en&next={{ request.url.path }}">{{ t("language.en") }}</a>
      </div>
      {% if authenticated %}
      <div class="nav-links">
        <a href="/items">{{ t("nav.items") }}</a>
        <a href="/tags">{{ t("nav.tags") }}</a>
        <a href="/creators">{{ t("nav.creators") }}</a>
        <a href="/stats">{{ t("nav.stats") }}</a>
        <a href="/import">{{ t("nav.import") }}</a>
        <a href="/backup">{{ t("nav.backup") }}</a>
        <form class="inline-form" action="/logout" method="post">
          <button class="secondary" type="submit">{{ t("nav.logout") }}</button>
        </form>
      </div>
      {% endif %}
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
