{% extends "base.html" %}
{% block title %}Login - NSFWTrack{% endblock %}
{% block content %}
<div class="split">
  <section>
    <h1>NSFWTrack</h1>
    <p class="muted">Local media records for one signed-in user.</p>
  </section>
  <section class="card">
    <h2>Login</h2>
    {% if error %}
      <p class="notice">Invalid password.</p>
    {% endif %}
    <form class="stack" action="/api/auth/login" method="post">
      <label>Password
        <input name="password" type="password" autocomplete="current-password" required autofocus>
      </label>
      <button type="submit">Login</button>
    </form>
  </section>
</div>
{% endblock %}
